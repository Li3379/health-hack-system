# Test Local Configuration - for integration tests with local MySQL/Redis
# IMPORTANT: Copy this file to application-test-local.yml and set your local credentials
# This file is gitignored to prevent accidental commits of local credentials

spring:
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/hhs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}  # REQUIRED - Set in environment or create .env file
  data:
    redis:
      host: localhost
      port: 16379
      password: ${REDIS_PASSWORD}  # REQUIRED - Set in environment or create .env file
      database: 0
  web:
    cors:
      allowed-origins: http://localhost:5173,http://localhost:3000
      allowed-methods: "*"
      allowed-headers: "*"
      allow-credentials: true

security:
  jwt:
    # Generate with: openssl rand -base64 32
    # For testing, you can use a fixed secret, but DO NOT use in production
    secret: ${JWT_SECRET:hhs-local-test-secret-key-for-development-only-256-bits}
    expire-days: 7

mybatis-plus:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl