spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hhs_test?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: localhost
      port: 16379
      database: 1
      password: ${REDIS_PASSWORD:}
      # Use lettuce with timeout and retry for better test reliability
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
        shutdown-timeout: 100ms
  jackson:
    timezone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
  cache:
    type: none
  ai:
    langchain4j:
      openai:
        chat-model:
          api-key: ${DASH_SCOPE_API_KEY:test-key}
          base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
          model-name: qwen3.5-flash
          temperature: 0.7
          max-tokens: 1000
          timeout: 30s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

knife4j:
  enable: false
  production: true

baidu:
  ocr:
    api-key: ${BAIDU_OCR_API_KEY:test-key}
    secret-key: ${BAIDU_OCR_SECRET_KEY:test-secret}

security:
  jwt:
    # Test JWT secret - 256 bits for HS256
    secret: hhs-test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
    expire-days: 7

logging:
  level:
    com.hhs: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    com.baomidou.mybatisplus: INFO
