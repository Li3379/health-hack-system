spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hhs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD}
  jackson:
    timezone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  ai:
    langchain4j:
      openai:
        chat-model:
          api-key: ${DASH_SCOPE_API_KEY}
          base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
          model-name: qwen3.5-flash
          temperature: 0.7
          max-tokens: 1000
          timeout: 30s
  lifecycle:
    timeout-per-shutdown-phase: 30s
  # 邮件推送配置（可选，未配置时邮件推送通道不可用）
  # 启用邮件推送需要配置 MAIL_* 环境变量
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true
          starttls:
            enable: true
            required: true
    default-encoding: UTF-8

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

knife4j:
  enable: false
  production: true

# Baidu OCR (optional, uses mock results if not configured)
baidu:
  ocr:
    api-key: ${BAIDU_OCR_API_KEY:}
    secret-key: ${BAIDU_OCR_SECRET_KEY:}

# JWT Configuration
security:
  jwt:
    secret: ${JWT_SECRET}
    expire-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    shutdown:
      enabled: false
  health:
    mail:
      enabled: false  # Disable mail health check when mail is not configured

# Application Configuration for Production
# IMPORTANT: Environment variables MUST be configured for production deployment
app:
  # API base URL for Swagger/OpenAPI documentation (used by Knife4jConfig)
  # Example: http://47.112.6.180 or https://api.yourdomain.com
  api:
    base-url: ${BASE_URL:}
  # CORS Configuration for Production
  # IMPORTANT: ALLOWED_ORIGINS environment variable MUST be configured
  # Example: export ALLOWED_ORIGINS="http://47.112.6.180"
  # For multiple domains: https://app1.com,https://app2.com
  security:
    allowed-origins: ${ALLOWED_ORIGINS:}
    verbose-errors: false
  websocket:
    allowed-origins: ${ALLOWED_ORIGINS:}

# Device OAuth Configuration for Production
# BASE_URL should be set to your server address (e.g., http://47.112.6.180)
device:
  mock:
    enabled: false
  oauth:
    huawei:
      client-id: ${HUAWEI_CLIENT_ID:}
      client-secret: ${HUAWEI_CLIENT_SECRET:}
      redirect-uri: ${BASE_URL}/api/device/callback/huawei
    xiaomi:
      client-id: ${XIAOMI_CLIENT_ID:}
      client-secret: ${XIAOMI_CLIENT_SECRET:}
      redirect-uri: ${BASE_URL}/api/device/callback/xiaomi