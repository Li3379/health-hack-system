spring:
  datasource:
    url: jdbc:mysql://localhost:3306/hhs?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&useSSL=true
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: 0
      password: ${REDIS_PASSWORD}
  jackson:
    timezone: Asia/Shanghai
    date-format: yyyy-MM-dd HH:mm:ss
  ai:
    langchain4j:
      openai:
        chat-model:
          api-key: ${DASH_SCOPE_API_KEY}
          base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
          model-name: qwen3.5-flash
          temperature: 0.7
          max-tokens: 1000
          timeout: 30s
  lifecycle:
    timeout-per-shutdown-phase: 30s

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*Mapper.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

knife4j:
  enable: false
  production: true

# Baidu OCR (optional, uses mock results if not configured)
baidu:
  ocr:
    api-key: ${BAIDU_OCR_API_KEY:}
    secret-key: ${BAIDU_OCR_SECRET_KEY:}

# JWT Configuration
security:
  jwt:
    secret: ${JWT_SECRET}
    expire-days: 7

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    shutdown:
      enabled: false

# CORS Configuration for Production
# IMPORTANT: ALLOWED_ORIGINS environment variable MUST be configured for production
# Example: export ALLOWED_ORIGINS="https://yourdomain.com"
# For multiple domains, use comma-separated: https://app1.com,https://app2.com
app:
  security:
    allowed-origins: ${ALLOWED_ORIGINS:}
    verbose-errors: false
  websocket:
    allowed-origins: ${ALLOWED_ORIGINS:}

# Device Mock Configuration
# IMPORTANT: Mock data MUST be disabled in production for data integrity
# Set to false to ensure sync operations fail when real API is unavailable
device:
  mock:
    enabled: false
