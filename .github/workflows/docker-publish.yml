# =============================================================================
# HHS Docker Publish Workflow
# =============================================================================
# Builds and pushes Docker images to GitHub Container Registry (ghcr.io)
# Triggers on push to main branch when backend/frontend/docker-compose changes
#
# Image Tags:
#   - latest: Most recent build on main branch
#   - sha-{commit}: Traceable commit-specific tag
#
# Prerequisites:
#   - Repository must have GITHUB_TOKEN with packages: write permission
#   - Dockerfiles must exist in hhs-backend/ and hhs-frontend-v2/
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [master]
    paths:
      - 'hhs-backend/**'
      - 'hhs-frontend-v2/**'
      - 'docker-compose*.yml'

permissions:
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # BACKEND IMAGE BUILD
  # ===========================================================================
  # Builds multi-stage Docker image for Spring Boot backend
  # Output: ghcr.io/{owner}/hhs-backend:latest and :sha-{commit}
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hhs-backend:latest
            ghcr.io/${{ github.repository_owner }}/hhs-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND IMAGE BUILD
  # ===========================================================================
  # Builds multi-stage Docker image for Vue.js frontend
  # Output: ghcr.io/{owner}/hhs-frontend:latest and :sha-{commit}
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-frontend-v2
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/hhs-frontend:latest
            ghcr.io/${{ github.repository_owner }}/hhs-frontend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max