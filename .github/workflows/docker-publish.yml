# =============================================================================
# HHS Docker Publish & Auto Deploy Workflow
# =============================================================================
# Builds and pushes Docker images to GitHub Container Registry (ghcr.io)
# Automatically deploys to ECS after successful build.
#
# Trigger: Push to master branch when backend/frontend/docker-compose changes
#
# Image Tags:
#   - latest: Most recent build on master branch
#   - sha-{commit}: Traceable commit-specific tag
#
# GitHub Secrets Required:
#   - ECS_HOST: ECS server IP address
#   - ECS_USER: SSH username
#   - ECS_SSH_KEY: SSH private key
#   - ECS_DEPLOY_PATH: Project path on server (e.g., /root/hhs)
#   - GHCR_TOKEN: GitHub PAT with read:packages permission
#
#   - VITE_API_BASE_URL: Backend API URL (WITHOUT /api suffix!)
#   - VITE_WS_BASE_URL: WebSocket URL (WITHOUT /ws suffix!)
# =============================================================================

name: Build & Deploy

on:
  push:
    branches: [master]
    paths:
      - 'hhs-backend/**'
      - 'hhs-frontend-v2/**'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker image names must be lowercase
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/hhs-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/hhs-frontend

jobs:
  # ===========================================================================
  # BACKEND IMAGE BUILD
  # ===========================================================================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (lowercase owner)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND IMAGE BUILD
  # ===========================================================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (lowercase owner)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-frontend-v2
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-frontend:sha-${{ github.sha }}
          # Build arguments for frontend
          # IMPORTANT: Do NOT include /api or /ws suffix in these URLs!
          # See documentation at top of file for correct configuration
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WS_BASE_URL=${{ secrets.VITE_WS_BASE_URL }}
          # Disable cache to ensure nginx.conf changes are picked up
          no-cache: true

  # ===========================================================================
  # DEPLOY TO ECS
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    if: success()
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          script: |
            cd ${{ secrets.ECS_DEPLOY_PATH }}
            
            # Pull latest code and docker-compose files
            git pull origin master
            
            # Login to GHCR for pulling images
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull and restart services
            docker compose pull
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d
            
            # Cleanup old images
            docker image prune -f

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 60
          echo "Checking backend health..."
          curl -f http://${{ secrets.ECS_HOST }}/actuator/health || exit 1
          echo "Deployment successful - backend is healthy"