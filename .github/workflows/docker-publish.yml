# =============================================================================
# HHS Docker Publish Workflow
# =============================================================================
# Builds and pushes Docker images to GitHub Container Registry (ghcr.io)
# Triggers on push to master branch when backend/frontend/docker-compose changes
#
# Image Tags:
#   - latest: Most recent build on master branch
#   - sha-{commit}: Traceable commit-specific tag
#
# Prerequisites:
#   - Repository must have GITHUB_TOKEN with packages: write permission
#   - Dockerfiles must exist in hhs-backend/ and hhs-frontend-v2/
#
# GitHub Secrets Configuration:
#   - VITE_API_BASE_URL: Backend API URL (WITHOUT /api suffix!)
#     * For Docker deployment with nginx: leave empty (recommended)
#     * For IP deployment: http://47.112.6.180
#     * For domain deployment: https://yourdomain.com
#     * WRONG: http://47.112.6.180/api (causes /api/api/... error)
#
#   - VITE_WS_BASE_URL: WebSocket URL (WITHOUT /ws suffix!)
#     * For Docker deployment: leave empty (auto-detected from browser)
#     * For IP deployment: ws://47.112.6.180
#     * For domain deployment: wss://yourdomain.com
# =============================================================================

name: Docker Publish

on:
  push:
    branches: [master]
    paths:
      - 'hhs-backend/**'
      - 'hhs-frontend-v2/**'
      - 'docker-compose*.yml'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

permissions:
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker image names must be lowercase
  REGISTRY: ghcr.io
  IMAGE_NAME_BACKEND: ${{ github.repository_owner }}/hhs-backend
  IMAGE_NAME_FRONTEND: ${{ github.repository_owner }}/hhs-frontend

jobs:
  # ===========================================================================
  # BACKEND IMAGE BUILD
  # ===========================================================================
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (lowercase owner)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Build and push backend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-backend
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-backend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-backend:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ===========================================================================
  # FRONTEND IMAGE BUILD
  # ===========================================================================
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (lowercase owner)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Build and push frontend image
        uses: docker/build-push-action@v7
        with:
          context: hhs-frontend-v2
          push: true
          tags: |
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-frontend:latest
            ghcr.io/${{ steps.meta.outputs.owner_lc }}/hhs-frontend:sha-${{ github.sha }}
          # Build arguments for frontend
          # IMPORTANT: Do NOT include /api or /ws suffix in these URLs!
          # See documentation at top of file for correct configuration
          build-args: |
            VITE_API_BASE_URL=${{ secrets.VITE_API_BASE_URL }}
            VITE_WS_BASE_URL=${{ secrets.VITE_WS_BASE_URL }}
          cache-from: type=gha
          cache-to: type=gha,mode=max