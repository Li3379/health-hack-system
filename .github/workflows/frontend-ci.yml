name: Frontend CI

on:
  push:
    branches: ['**']
    paths:
      - 'hhs-frontend-v2/**'
  pull_request:
    branches: [master]
    paths:
      - 'hhs-frontend-v2/**'

concurrency:
  group: frontend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hhs-frontend-v2

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'hhs-frontend-v2/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint:check

      - name: Test
        run: npm run test:run