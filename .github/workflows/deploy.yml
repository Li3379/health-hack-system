# =============================================================================
# HHS Deployment Workflow
# =============================================================================
# Deploys the HHS application to Alibaba Cloud ECS with environment protection.
#
# Trigger: Manual (workflow_dispatch) - no automatic triggers
# Environment: production (requires approval from configured reviewers)
#
# Prerequisites:
#   - GitHub Secrets configured (ECS_HOST, ECS_USER, ECS_SSH_KEY, ECS_DEPLOY_PATH)
#   - GHCR_TOKEN: GitHub Personal Access Token with read:packages permission
#   - Production environment created with required reviewers
#   - ECS server prepared with docker-compose files
#   - GHCR images published (run docker-publish workflow first)
#
# Usage:
#   1. Go to Actions > Deploy > Run workflow
#   2. Reviewers approve in the production environment
#   3. Deployment proceeds automatically
# =============================================================================

name: Deploy

on:
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Extract metadata (lowercase owner)
        id: meta
        run: |
          OWNER_LC=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          echo "owner_lc=$OWNER_LC" >> $GITHUB_OUTPUT

      - name: Deploy to ECS
        uses: appleboy/ssh-action@v1
        env:
          OWNER: ${{ steps.meta.outputs.owner_lc }}
          IMAGE_TAG: latest
        with:
          host: ${{ secrets.ECS_HOST }}
          username: ${{ secrets.ECS_USER }}
          key: ${{ secrets.ECS_SSH_KEY }}
          envs: OWNER,IMAGE_TAG
          script: |
            cd ${{ secrets.ECS_DEPLOY_PATH }}

            # Remove override file to prevent dev config leaking into production
            rm -f docker-compose.override.yml

            # Update docker-compose files from repository
            git pull origin master

            # Ensure override file stays removed after git pull
            rm -f docker-compose.override.yml

            # Login to GHCR for pulling images
            echo ${{ secrets.GHCR_TOKEN }} | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # Force pull latest images (ignore local cache)
            docker compose -f docker-compose.yml -f docker-compose.prod.yml pull --ignore-buildable

            # Stop old containers and recreate with new images
            docker compose -f docker-compose.yml -f docker-compose.prod.yml down
            docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --force-recreate

            # Cleanup old images
            docker image prune -f

            # Verify running images
            echo "=== Running containers ==="
            docker compose -f docker-compose.yml -f docker-compose.prod.yml ps

      - name: Health check
        run: |
          echo "Waiting for services to start..."
          sleep 60
          echo "Checking backend health..."
          curl -f http://${{ secrets.ECS_HOST }}/actuator/health || exit 1
          echo "Deployment successful - backend is healthy"
