name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'hhs-backend/**'
  pull_request:
    branches: [master]
    paths:
      - 'hhs-backend/**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hhs-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'hhs-backend/pom.xml'

      - name: Build and run unit tests
        run: mvn clean verify -DskipITs

  integration-test:
    runs-on: ubuntu-latest
    needs: build
    defaults:
      run:
        working-directory: hhs-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'hhs-backend/pom.xml'

      - name: Run integration tests with Testcontainers
        run: mvn verify -DskipTests failsafe:integration-test failsafe:verify

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: hhs-backend/target/failsafe-reports/