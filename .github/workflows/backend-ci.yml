name: Backend CI

on:
  push:
    branches: ['**']
    paths:
      - 'hhs-backend/**'
  pull_request:
    branches: [master]
    paths:
      - 'hhs-backend/**'

concurrency:
  group: backend-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hhs-backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'
          cache-dependency-path: 'hhs-backend/pom.xml'

      - name: Build and test
        run: mvn clean verify -DskipITs